name: Examples

on:
  push:
    tags:
      - v*
    branches:
      - master
  pull_request:

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: [ '1.13', '1.14' ]
    steps:

    - name: Set up Go 1.x
      uses: actions/setup-go@v2
      with:
        go-version: ${{ matrix.go }}
      id: go

    - name: Check out code into the Go module directory
      uses: actions/checkout@v2

    - name: Get dependencies
      run: go mod download

    - name: Globally
      run: sudo make globally

    - name: Example "Environment variables"
      run: make run-example-env

    - name: Example "Library"
      run: make run-example-library

    - name: Example "Params"
      run: make run-example-params

    - name: Exmaple "Circular dependencies"
      run: make run-example-circular-deps
