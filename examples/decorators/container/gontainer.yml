meta:
  pkg: "container"
  container_constructor: "New"
  imports:
    pkg: "decorators/pkg"

services:
  chainDoer:
    value: "&pkg.ChainDoer{}"
    fields:
      doers: "!tagged doer.step"
    getter: "GetChainDoer"
    type: "*pkg.ChainDoer"

  doer1:
    constructor: "pkg.NewSimpleDoer"
    args: [1]
    tags: ["doer.step"]

  doer2:
    constructor: "pkg.NewSimpleDoer"
    args: [2]
    tags: ["doer.step"]

  doer3:
    constructor: "pkg.NewSimpleDoer"
    args: [3]
    tags: [{name: "doer.step", priority: 100}]

decorators:
  - tag: "doer.step"
    decorator: "pkg.NewDecoratedSimpleDoer"
